<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prima mea pagina</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #4b2c0e, #8b5e2f, #a97c3e, #c9a84c, #d4af37, #f5c842);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Georgia, 'Times New Roman', serif;
    }

    .container {
      text-align: center;
      padding: 60px 80px;
      margin: 20px;
      background: rgba(255, 255, 255, 0.08);
      border: 2px solid rgba(212, 175, 55, 0.5);
      border-radius: 16px;
      backdrop-filter: blur(6px);
      box-shadow: 0 8px 40px rgba(75, 44, 14, 0.5);
      max-width: 800px;
      width: 100%;
    }

    h1 {
      font-size: clamp(1.5rem, 5vw, 3rem);
      color: #fff8e7;
      text-shadow: 2px 2px 8px rgba(75, 44, 14, 0.8), 0 0 20px rgba(75, 44, 14, 0.5);
      letter-spacing: 2px;
      word-break: break-word;
    }

    @media (max-width: 480px) {
      .container {
        padding: 40px 30px;
        margin: 16px;
      }
    }

    .underline {
      width: 80%;
      height: 3px;
      margin: 20px auto 0;
      background: linear-gradient(90deg, #4b2c0e, #cd7f32, #f5c842);
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Asta e prima mea pagina!</h1>
    <div class="underline"></div>
  </div>
</body>
</html>
